<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>EKAKAMOV | Снятие выговоров (Multi-Upload)</title>
    <style>
        :root { --primary: #8b0000; --accent: #ff0000; --bg: #050505; --card-bg: rgba(15, 15, 15, 0.98); --text: #ffffff; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; }
        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% -20%, #440000 0%, #050505 80%); z-index: -1; }
        nav { display: flex; justify-content: center; background: rgba(10, 10, 10, 0.9); padding: 15px; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000; }
        nav a { color: #888; margin: 0 20px; text-decoration: none; font-weight: bold; font-size: 13px; text-transform: uppercase; }
        .container { max-width: 650px; margin: 40px auto; padding: 0 15px; }
        .unwarn-form { background: var(--card-bg); padding: 35px; border-radius: 15px; border: 1px solid #222; box-shadow: 0 10px 50px rgba(0,0,0,0.8); }
        .form-header { color: var(--accent); border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 25px; text-transform: uppercase; text-align: center; }
        label { display: block; margin-bottom: 8px; font-size: 12px; color: #777; text-transform: uppercase; font-weight: bold; }
        input, textarea { width: 100%; padding: 14px; margin-bottom: 20px; background: #0a0a0a; border: 1px solid #222; color: #fff; border-radius: 6px; box-sizing: border-box; }
        .file-select { border: 2px dashed #333; padding: 30px; text-align: center; border-radius: 8px; cursor: pointer; margin-bottom: 25px; transition: 0.3s; }
        .file-select.ready { border-color: #2ecc71; background: rgba(46, 204, 113, 0.05); }
        .btn-submit { background: var(--accent); color: #fff; border: none; padding: 18px; width: 100%; font-weight: bold; text-transform: uppercase; cursor: pointer; border-radius: 6px; }
        #loader { display: none; text-align: center; color: var(--accent); font-weight: bold; margin-top: 15px; padding: 10px; border: 1px solid var(--accent); }
        .img-count { font-size: 14px; color: #aaa; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
     <nav>
        <a href="index.html">Главная</a>
        <a href="members.html">Состав</a>
        <a href="rules.html">Устав</a>
        <a href="rankup.html">Повышение</a>
        <a href="unwarn.html">Выговоры</a>
        <a href="complaints.html">Отчет жалоб</a>
        <a href="Bonus.html">Премиальная система</a>
    </nav>

    <div class="container">
        <div class="unwarn-form">
            <h2 class="form-header">Снятие выговора</h2>
            
            <label>1. Ваш Nick Name:</label>
            <input type="text" id="myNick" placeholder="Nick_Name">

            <label>2. Ваша должность:</label>
            <input type="text" id="myRank" placeholder="Напр: Терапевт [4]">

            <label>3. Описание работы:</label>
            <textarea id="workDesc" rows="3" placeholder="Что сделано?"></textarea>

            <label>4. Доказательства (макс. 5 фото):</label>
            <div class="file-select" id="dropZone" onclick="document.getElementById('hiddenFile').click()">
                <span id="statusText">ВЫБРАТЬ ФОТО (можно несколько)</span>
                <div class="img-count" id="countDisplay">Выбрано: 0 / 5</div>
                <input type="file" id="hiddenFile" accept="image/*" multiple hidden onchange="handleFiles(this)">
            </div>

            <button class="btn-submit" id="sendBtn" onclick="sendToTG()">ОТПРАВИТЬ ОТЧЕТ</button>
            <div id="loader">🚀 ОТПРАВЛЯЕМ ФОТО... ПОЖАЛУЙСТА, ЖДИТЕ</div>
        </div>
    </div>

    <script>
        const TG_TOKEN = "7922162882:AAFvx7yUn3sS-hkA6CwzSh1rcPFxPcSm71E"; 
        const CHAT_IDS = ["2018168530", "8274600686"];
        
        let filesArray = []; // Массив для хранения сжатых фото

        async function handleFiles(input) {
            const files = Array.from(input.files).slice(0, 5); // Берем только первые 5
            if (files.length === 0) return;

            filesArray = [];
            document.getElementById('statusText').innerText = "⌛ Сжатие...";
            
            for (let file of files) {
                const blob = await compressImg(file);
                filesArray.push(blob);
                document.getElementById('countDisplay').innerText = `Выбрано: ${filesArray.length} / 5`;
            }

            document.getElementById('statusText').innerText = "✅ ФОТО ГОТОВЫ К ОТПРАВКЕ";
            document.getElementById('dropZone').classList.add('ready');
        }

        function compressImg(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_W = 1200;
                        let w = img.width, h = img.height;
                        if (w > MAX_W) { h *= MAX_W / w; w = MAX_W; }
                        canvas.width = w; canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        canvas.toBlob((b) => resolve(b), 'image/jpeg', 0.7);
                    };
                };
                reader.readAsDataURL(file);
            });
        }

        async function sendToTG() {
            const nick = document.getElementById('myNick').value;
            const rank = document.getElementById('myRank').value;
            const desc = document.getElementById('workDesc').value;

            if(!nick || !rank || filesArray.length === 0) {
                alert("Заполни поля и выбери хотя бы 1 фото!");
                return;
            }

            document.getElementById('sendBtn').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            const message = `🛠 **ОТЧЕТ НА СНЯТИЕ ВЫГОВОРА**\n👤 **Игрок:** ${nick}\n🎖 **Ранг:** ${rank}\n📝 **Описание:** ${desc}`;

            try {
                for (let chatId of CHAT_IDS) {
                    // Отправляем первое фото с текстом
                    let form1 = new FormData();
                    form1.append("chat_id", chatId);
                    form1.append("caption", message);
                    form1.append("parse_mode", "Markdown");
                    form1.append("photo", filesArray[0], "1.jpg");
                    await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendPhoto`, { method: "POST", body: form1 });

                    // Отправляем остальные фото (если есть) без текста, чтобы не спамить
                    for (let i = 1; i < filesArray.length; i++) {
                        let formNext = new FormData();
                        formNext.append("chat_id", chatId);
                        formNext.append("photo", filesArray[i], `${i+1}.jpg`);
                        await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendPhoto`, { method: "POST", body: formNext });
                    }
                }
                alert("✅ Все фото успешно доставлены лидерам!");
                location.reload();
            } catch (e) {
                alert("Ошибка! Проверь интернет.");
                document.getElementById('sendBtn').style.display = 'block';
                document.getElementById('loader').style.display = 'none';
            }
        }
    </script>
</body>
</html>
