<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>EKAKAMOV | УСТАВ СЕМЬИ</title>
    <style>
        :root { --primary: #8b0000; --accent: #ff0000; --bg: #050505; --card-bg: rgba(15, 15, 15, 0.98); --text: #ffffff; --gold: #d4af37; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; }
        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% -20%, #440000 0%, #050505 80%); z-index: -1; }
        
        nav { display: flex; justify-content: center; flex-wrap: wrap; background: rgba(10, 10, 10, 0.9); padding: 15px; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000; }
        nav a { color: #888; margin: 5px 15px; text-decoration: none; font-weight: bold; font-size: 13px; text-transform: uppercase; transition: 0.3s; }
        nav a:hover { color: var(--gold); }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .header { text-align: center; margin-bottom: 50px; }
        .header h1 { font-size: 45px; color: var(--gold); letter-spacing: 5px; text-transform: uppercase; margin-bottom: 10px; text-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }
        
        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        
        .section { background: var(--card-bg); border: 1px solid #222; border-radius: 15px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .section h2 { border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-top: 0; text-transform: uppercase; letter-spacing: 2px; font-size: 20px; }
        
        .rule-list { height: 600px; overflow-y: auto; padding-right: 10px; margin-top: 20px; }
        .rule-list::-webkit-scrollbar { width: 4px; }
        .rule-list::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        .item { background: rgba(255,255,255,0.02); padding: 12px; margin-bottom: 8px; border-radius: 5px; border-left: 3px solid var(--primary); transition: 0.3s; font-size: 14px; line-height: 1.4; }
        .item:hover { background: rgba(255,255,255,0.05); transform: translateX(5px); }
        .item b { color: var(--gold); margin-right: 8px; }

        .punishment { color: #ff4d4d; font-size: 11px; font-weight: bold; display: block; margin-top: 5px; text-transform: uppercase; }

        @media (max-width: 900px) { .grid-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
       <nav>
        <a href="index.html">Главная</a>
        <a href="members.html">Состав</a>
        <a href="rules.html">Устав</a>
        <a href="rankup.html">Повышение</a>
        <a href="unwarn.html">Выговоры</a>
        <a href="complaints.html">Отчет жалоб</a>
        <a href="Bonus.html">Премиальная система</a>
    </nav>
    <div class="container">
        <div class="header">
            <h1>УСТАВ EKAKAMOV</h1>
            <p style="color: #888;">Незнание правил не освобождает от изгнания</p>
        </div>

        <div class="grid-layout">
            <div class="section">
                <h2 style="color: #ff4d4d;">🚫 СТРОГИЕ ЗАПРЕТЫ</h2>
                <div class="rule-list" id="prohibit-list"></div>
            </div>

            <div class="section">
                <h2 style="color: #2ecc71;">⚖️ ЭТИКЕТ И ПОВЕДЕНИЕ</h2>
                <div class="rule-list" id="behave-list"></div>
            </div>
        </div>
    </div>

    <script>
        const prohibitions = [
            ["Оскорбление своих", "Выговор / Кик"], ["ТК (Убийство своих)", "Кик + ЧС"], 
            ["Игнор приказов Лидера", "Выговор"],
            ["Попрошайничество рангов", "Мут / Понижение"], ["Сотрудничество с врагами", "Кик + ЧС"],
            ["Обман руководства", "Кик"], ["Флуд в семейных чатах", "Мут 30 мин"],
            ["Капс / Мат в чатах", "Мут 20 мин"], ["Оскорбление родных", "Бан семьи + ЧС"],
            ["Выход из семьи без причины", "ЧС"],
            ["Неадекватное РП", "Выговор"], ["Подстава своих под жалобы", "Кик"],
            ["ДМ гражданских без разрешения", "Выговор"],
            ["Продажа инфы о фаме", "Кик + ЧС"], ["Крысятничество в любом виде", "Кик + ЧС"],
            ["Споры со старшим составом", "Мут / Выговор"], ["Мешать проведению РП", "Выговор"],
            ["Использование читов", "Кик + ЧС"], ["Реклама сторонних ресурсов", "Бан семьи"],
             ["Оскорбление наций", "Кик"], ["Игнор сбора в Дискорде или в Телеграм", "Выговор"],
            ["Выпрашивание денег у замов", "Мут"], ["Менять ник без доклада", "Предупреждение / Кик + ЧС"],
            ["Срыв тренировок", "Кик"], ["Помеха работе других фам", "Выговор"],
            ["Блат (для старших)", "Снятие + Кик"], ["Неактив более 7 дней", "Кик"],
            ["Разглашение тактики боя", "Выговор"], 
            ["Оскорбление союзов", "Кик"],
            ["Взятие матов сверх нормы", "Выговор"], ["Помеха Лидеру в чате", "Мут"],
            ["Попытка подкупа замов", "Выговор"], ["ДБ своих на машинах", "Штраф 50к"],
             ["Слив инфы из конфы ДС/ТГ", "Кик + ЧС"],
             ["Продажа рангов", "Снятие + ЧС"]
        ];

        const behavior = [
            "Здороваться со всеми при входе.", "Соблюдать субординацию (Вы/Сэр).",
            "Помогать новичкам с командами.", "Быть в Дискорде на всех ГРП.",
            "Сдавать 10% прибыли в общак (добровольно).", "Быть всегда при оружии и масках. (Не обязательно)",
            "Защищать Лидера любой ценой.", "Соблюдать РП режим.",
            "Следить за новостями в ТГ канале.", "Предупреждать об уходе в АФК.",
            "Иметь опрятный скин.", "Быть вежливым с гражданскими.",
            "Докладывать о нарушениях.", "Быть инициативным на ГРП.",
            "Знать врагов семьи в лицо.", "Уважать союзные группировки.",
            "Быть честным в отчетах на премии.", "Помогать в обороне территорий.",
            "Участвовать в жизни Дискорда и Телеграмма.", "Соблюдать правила сервера.",
            "Быть адекватным в чате.", "Не позорить фамилию EKAKAMOV.",
            "Выполнять задания от Заместителей.", 
            "Являться на собрания вовремя.", "Отвечать на вопросы в чатах.",
            "Брать ответственность за косяки.", "Быть хладнокровным в перестрелках.",
            "Соблюдать тишину на лекциях.", "Использовать теги в чатах.",
            "Поддерживать онлайн семьи.", "Участвовать в дуэлях для опыта.",
            "Сдавать найденные улики старшим.", "Быть примером для других фам.",
            "Не лезть в чужие разборки без приказа.", "Соблюдать правила общака.",
            "Предупреждать о долгом неактиве.","Следить за репутацией в области.", "Изучать устав раз в неделю.",
            "Помогать соратникам с деньгами.", "Соблюдать дресс-код на встречах.",
            "Быть готовым к проверке устава.", "Не привлекать лишнее внимание.",
            "Повышать навыки стрельбы ежедневно.", "Верность семье превыше всего."
        ];

        function loadRules(id, data, hasPunish) {
            const list = document.getElementById(id);
            data.forEach((rule, i) => {
                const div = document.createElement('div');
                div.className = 'item';
                if (hasPunish) {
                    div.innerHTML = `<b>${i+1}.</b> ${rule[0]} <span class="punishment">[Наказание: ${rule[1]}]</span>`;
                } else {
                    div.innerHTML = `<b>${i+1}.</b> ${rule}`;
                }
                list.appendChild(div);
            });
        }

        loadRules('prohibit-list', prohibitions, true);
        loadRules('behave-list', behavior, false);
    </script>
</body>
</html>
